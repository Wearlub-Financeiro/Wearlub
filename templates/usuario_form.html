{% extends "base.html" %}
{% block title %}{% if u %}Editar{% else %}Novo{% endif %} Usuário — WEARLUB{% endblock %}
{% block content %}
<div class="page-title">{% if u %}Editar Usuário{% else %}Novo Usuário{% endif %}</div>
<div class="card-panel" style="max-width:600px;">
  <div class="card-panel-header">
    <h5><i class="fa-solid fa-users-gear" style="color:var(--gold-dark);margin-right:8px;"></i>Dados do Usuário</h5>
    <button class="toggle-btn"><i class="fa-solid fa-chevron-up"></i></button>
  </div>
  <div class="card-panel-body">
    <form method="POST">
      <div class="form-row col-2">
        <div class="form-group">
          <label>Nome *</label>
          <input type="text" name="nome" class="form-control" value="{{ u.nome if u else '' }}" required>
        </div>
        <div class="form-group">
          <label>Login *</label>
          <input type="text" name="login" class="form-control" value="{{ u.login if u else '' }}"
                 oninput="this.value=this.value.toUpperCase()" required>
        </div>
      </div>
      <div class="form-row col-2">
        <div class="form-group">
          <label>Senha {% if u %}(vazio = manter){% endif %}</label>
          <input type="password" name="senha" class="form-control" {% if not u %}required{% endif %}>
        </div>
        <div class="form-group">
          <label>Perfil</label>
          <select name="perfil" class="form-control">
            <option value="usuario" {% if not u or u.perfil=='usuario' %}selected{% endif %}>Usuário</option>
            <option value="admin" {% if u and u.perfil=='admin' %}selected{% endif %}>Administrador</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="submit" class="btn btn-gold"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-dark"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
