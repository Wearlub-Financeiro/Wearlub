{% extends "base.html" %}
{% block title %}Configurações — WEARLUB{% endblock %}
{% block content %}
<div class="page-title">Configurações & Parâmetros Fiscais</div>
<div class="card-panel" style="max-width:780px;">
  <div class="card-panel-header">
    <h5><i class="fa-solid fa-sliders" style="color:var(--gold-dark);margin-right:8px;"></i>Saldos Iniciais e Impostos</h5>
    <button class="toggle-btn"><i class="fa-solid fa-chevron-up"></i></button>
  </div>
  <div class="card-panel-body">
    <form method="POST" action="{{ url_for('configuracoes') }}">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px;font-weight:600;text-transform:uppercase;">
        🏁 Saldos Iniciais (Abertura de Caixa)
      </p>
      <div class="form-row col-2">
        <div class="form-group">
          <label>Saldo Conta Normal (R$)</label>
          <input type="text" name="saldo_normal" class="form-control valor-brl" value="{{ cfg.saldo_inicial_normal }}">
        </div>
        <div class="form-group">
          <label>Saldo Saúde da Empresa (R$)</label>
          <input type="text" name="saldo_saude" class="form-control valor-brl" value="{{ cfg.saldo_inicial_saude }}">
        </div>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin:16px 0 12px;font-weight:600;text-transform:uppercase;">
        📊 Regime Tributário e Alíquotas
      </p>
      <div class="form-row col-2">
        <div class="form-group">
          <label>Regime Tributário</label>
          <select name="regime" class="form-control">
            <option {% if cfg.regime_tributario=='Lucro Presumido' %}selected{% endif %}>Lucro Presumido</option>
            <option {% if cfg.regime_tributario=='Simples Nacional' %}selected{% endif %}>Simples Nacional</option>
          </select>
        </div>
        <div class="form-group">
          <label>Comissão Padrão Técnicos (%)</label>
          <input type="text" name="comissao" class="form-control pct-br" value="{{ cfg.comissao_padrao }}">
        </div>
      </div>
      <div class="form-row col-3">
        <div class="form-group"><label>PIS (%)</label><input type="text" name="pis" class="form-control pct-br" value="{{ cfg.pis }}"></div>
        <div class="form-group"><label>COFINS (%)</label><input type="text" name="cofins" class="form-control pct-br" value="{{ cfg.cofins }}"></div>
        <div class="form-group"><label>ISS (%)</label><input type="text" name="iss" class="form-control pct-br" value="{{ cfg.iss }}"></div>
        <div class="form-group"><label>IRPJ (%)</label><input type="text" name="irpj" class="form-control pct-br" value="{{ cfg.irpj }}"></div>
        <div class="form-group"><label>CSLL (%)</label><input type="text" name="csll" class="form-control pct-br" value="{{ cfg.csll }}"></div>
        <div class="form-group"><label>Simples Nacional (%)</label><input type="text" name="simples" class="form-control pct-br" value="{{ cfg.aliquota_simples }}"></div>
      </div>
      <button type="submit" class="btn btn-gold" style="margin-top:8px;">
        <i class="fa-solid fa-floppy-disk"></i> Salvar Configurações
      </button>
    </form>
  </div>
</div>
{% endblock %}
