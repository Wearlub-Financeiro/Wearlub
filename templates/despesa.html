{% extends "base.html" %}
{% block title %}Lançar Despesa — WEARLUB{% endblock %}
{% block content %}
<div class="page-title">Lançar Despesa</div>
<div class="card-panel" style="max-width:780px;">
  <div class="card-panel-header">
    <h5><i class="fa-solid fa-circle-arrow-down" style="color:var(--danger);margin-right:8px;"></i>Nova Saída / Custo</h5>
    <button class="toggle-btn"><i class="fa-solid fa-chevron-up"></i></button>
  </div>
  <div class="card-panel-body">
    <form method="POST" action="{{ url_for('despesa') }}">
      <div class="form-row col-2">
        <div class="form-group">
          <label>💳 Conta de Origem</label>
          <select name="origem_conta" class="form-control">
            <option>Conta Normal</option>
            <option>Saúde da Empresa</option>
          </select>
        </div>
        <div class="form-group">
          <label>Classificação</label>
          <select name="categoria" class="form-control">
            {% for c in categorias_despesa %}<option>{{ c }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="form-row col-2">
        <div class="form-group">
          <label>Descrição / Motivo</label>
          <input type="text" name="descricao" class="form-control" placeholder="Ex: Aluguel escritório maio/2026">
        </div>
        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="text" name="valor_bruto" id="valor_bruto" class="form-control valor-brl"
                 placeholder="0,00" required>
        </div>
      </div>
      <div class="form-row col-2">
        <div class="form-group">
          <label>Data / Vencimento</label>
          <input type="date" name="data_vencimento" class="form-control" value="{{ hoje }}">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select name="status" class="form-control">
            <option>Pago/Recebido</option>
            <option>Pendente</option>
          </select>
        </div>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;">
        <button type="submit" class="btn btn-danger"><i class="fa-solid fa-floppy-disk"></i> Confirmar Despesa</button>
        <a href="{{ url_for('fluxo_caixa') }}" class="btn btn-dark"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}{% endblock %}
